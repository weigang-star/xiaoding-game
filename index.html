<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>爱分手的小丁</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #111;
  color: #eee;
  height: 100vh;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

#app {
  max-width: 420px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh;
  position: relative;
  background: #1a1a2e;
  overflow: hidden;
}

.screen {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  flex-direction: column;
}
.screen.active { display: flex; }

.start-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px 30px;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}

.title-art {
  font-size: 80px;
  margin-bottom: 20px;
  animation: heartbeat 2s ease-in-out infinite;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.15); }
  30% { transform: scale(1); }
  45% { transform: scale(1.1); }
}

.game-title {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #e94560, #ff6b6b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  color: #888;
  margin-bottom: 30px;
}

.desc {
  font-size: 15px;
  color: #aaa;
  text-align: center;
  line-height: 2;
  margin-bottom: 40px;
}

.btn-start {
  background: linear-gradient(135deg, #e94560, #c23152);
  color: #fff;
  border: none;
  padding: 14px 50px;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
  -webkit-appearance: none;
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(233,69,96,0.4);
}
.btn-start:active { transform: translateY(0); }

.tips {
  margin-top: 30px;
  font-size: 12px;
  color: #555;
  text-align: center;
  line-height: 1.8;
}

.status-bar {
  background: #16213e;
  padding: 10px 15px;
  padding-top: max(10px, env(safe-area-inset-top));
  border-bottom: 1px solid #0f3460;
  flex-shrink: 0;
}

.day-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
}

#day-num { font-weight: 700; color: #e94560; }
#time-slot { color: #ffd460; font-weight: 600; }
.xd-mood { font-size: 12px; color: #aaa; }

.resources {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.res-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

.res-label { width: 55px; flex-shrink: 0; font-size: 11px; }

.res-bar {
  flex: 1;
  height: 8px;
  background: #0a0a1a;
  border-radius: 4px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.bar-fill.mood { background: linear-gradient(90deg, #e94560, #ff6b9d); }
.bar-fill.money { background: linear-gradient(90deg, #f5a623, #ffd460); }
.bar-fill.time { background: linear-gradient(90deg, #3498db, #74b9ff); }
.bar-fill.trust { background: linear-gradient(90deg, #2ecc71, #55efc4); }

.res-val { width: 30px; text-align: right; font-weight: 600; font-size: 11px; }

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

.msg-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  animation: msgIn 0.3s ease;
}

.msg-row-xd { align-self: flex-start; max-width: 85%; }
.msg-row-me { align-self: flex-end; flex-direction: row-reverse; max-width: 85%; }

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  position: relative;
  overflow: hidden;
}

.avatar-xd {
  background: linear-gradient(135deg, #ff9a9e, #fecfef);
  box-shadow: 0 2px 8px rgba(255,154,158,0.3);
}

.avatar-xd::after {
  content: "👩";
  font-size: 22px;
}

.avatar-me {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 2px 8px rgba(102,126,234,0.3);
}

.avatar-me::after {
  content: "👨";
  font-size: 22px;
}

.msg-bubble {
  display: flex;
  flex-direction: column;
}

.msg-name {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 3px;
}

.msg-name-xd { color: #e94560; }
.msg-name-me { color: #74b9ff; text-align: right; }

.msg {
  max-width: 100%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-xd {
  background: #2d3436;
  color: #dfe6e9;
  border-top-left-radius: 4px;
}

.msg-me {
  background: #0f3460;
  color: #dfe6e9;
  border-top-right-radius: 4px;
}

.msg-system {
  align-self: center;
  background: none;
  color: #636e72;
  font-size: 12px;
  text-align: center;
  padding: 5px 10px;
}

.msg-narrator {
  align-self: center;
  background: rgba(233,69,96,0.1);
  border: 1px solid rgba(233,69,96,0.2);
  color: #b2bec3;
  font-size: 13px;
  text-align: center;
  max-width: 90%;
  font-style: italic;
}

.msg-effect {
  align-self: center;
  background: rgba(255,255,255,0.05);
  color: #ffd460;
  font-size: 12px;
  text-align: center;
  padding: 6px 14px;
  border-radius: 20px;
}

.effect-positive { color: #55efc4; }
.effect-negative { color: #ff7675; }

.choices-area {
  padding: 12px 15px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: #16213e;
  border-top: 1px solid #0f3460;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  max-height: 45vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.choice-btn {
  background: #1a1a2e;
  border: 1px solid #2d3436;
  color: #dfe6e9;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.5;
  -webkit-appearance: none;
}

.choice-btn:hover {
  background: #0f3460;
  border-color: #3498db;
  transform: translateX(4px);
}

.choice-btn:active {
  background: #0f3460;
  border-color: #3498db;
  transform: translateX(2px);
}

.choice-btn .choice-cost {
  display: block;
  font-size: 11px;
  color: #888;
  margin-top: 4px;
}

.choice-btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}

.choice-btn.action-btn {
  background: linear-gradient(135deg, #0f3460, #16213e);
  border-color: #3498db;
}

.choice-btn.next-btn {
  background: linear-gradient(135deg, #2d3436, #1a1a2e);
  border-color: #636e72;
  text-align: center;
  color: #aaa;
}

.ending-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px 30px;
  text-align: center;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  overflow-y: auto;
}

.ending-icon { font-size: 80px; margin-bottom: 20px; }

.ending-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 20px;
  color: #e94560;
}

.ending-text {
  font-size: 15px;
  color: #b2bec3;
  line-height: 2;
  margin-bottom: 30px;
  max-width: 320px;
  white-space: pre-line;
}

.ending-stats {
  font-size: 13px;
  color: #636e72;
  margin-bottom: 30px;
  line-height: 2;
}

.shake { animation: shake 0.5s ease; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

@media (min-width: 421px) {
  #app { border-left: 1px solid #333; border-right: 1px solid #333; }
}
</style>
</head>
<body>
<div id="app">
  <div id="screen-start" class="screen active">
    <div class="start-container">
      <div class="title-art">💔</div>
      <h1 class="game-title">爱分手的小丁</h1>
      <p class="subtitle">一款苦情恋爱生存游戏</p>
      <p class="desc">她不是不爱你<br>是她爸不让她爱你<br>因为你是苏北的</p>
      <button class="btn-start" onclick="Game.start()">开始新游戏</button>
      <div class="tips">"我们没有做错任何事，<br>只是出生在了不同的地方。"</div>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <div class="status-bar">
      <div class="day-info">
        <span id="day-num">第1天</span>
        <span id="time-slot">早上</span>
        <span id="xiaoding-mood" class="xd-mood">小丁：😢 心疼</span>
      </div>
      <div class="resources">
        <div class="res-item">
          <span class="res-label">🧠 心态</span>
          <div class="res-bar"><div id="bar-mood" class="bar-fill mood" style="width:70%"></div></div>
          <span id="val-mood" class="res-val">70</span>
        </div>
        <div class="res-item">
          <span class="res-label">💰 钱包</span>
          <div class="res-bar"><div id="bar-money" class="bar-fill money" style="width:50%"></div></div>
          <span id="val-money" class="res-val">50</span>
        </div>
        <div class="res-item">
          <span class="res-label">⏰ 时间</span>
          <div class="res-bar"><div id="bar-time" class="bar-fill time" style="width:100%"></div></div>
          <span id="val-time" class="res-val">4/4</span>
        </div>
        <div class="res-item">
          <span class="res-label">🤝 信任</span>
          <div class="res-bar"><div id="bar-trust" class="bar-fill trust" style="width:50%"></div></div>
          <span id="val-trust" class="res-val">50</span>
        </div>
      </div>
    </div>
    <div id="chat-area" class="chat-area"></div>
    <div id="choices-area" class="choices-area"></div>
  </div>

  <div id="screen-ending" class="screen">
    <div class="ending-container">
      <div id="ending-icon" class="ending-icon">💔</div>
      <h2 id="ending-title" class="ending-title">结局</h2>
      <p id="ending-text" class="ending-text"></p>
      <div id="ending-stats" class="ending-stats"></div>
      <button class="btn-start" onclick="Game.restart()">重新开始</button>
    </div>
  </div>
</div>

<script>
// ==================== 事件池 ====================
// 背景：你是苏北人，在南京/苏南打拼。小丁是本地人，她爱你，但她爸因为地域偏见坚决反对。
// 小丁夹在你和她爸之间，痛苦挣扎。她每次说"分手"都是含着泪的，不是不爱，是扛不住了。
// 信任值 = 这段关系能撑多久（她爸的施压会持续降低它）
// 心态值 = 你的精神状态（被歧视、被看不起会持续消耗）
// 钱包值 = 你的经济实力（想证明自己就得拼命赚钱）

var EVENT_POOL = [
  // ===== 小丁心疼你类（她的挣扎） =====
  {
    id: 'xd_crying_call', type: 'repair',
    messages: [
      { from: 'narrator', text: '凌晨一点，小丁打来电话。你接起来，听到的是抽泣声。' },
      { from: 'xd', text: '我爸今天又骂我了……' },
      { from: 'xd', text: '他说我不争气，找了个苏北的……' },
      { from: 'xd', text: '我好累……但我不想跟你分开……' },
    ],
    choices: [
      { text: '"别哭了，有我在，我们会好的"', cost: '心态-10，信任+10', effects: { mood: -10, trust: 10 }, xdEmotion: 'torn', response: '别哭了，有我在。不管怎样，我都不会放手的。', responseFrom: 'me', followUp: { from: 'narrator', text: '你说着安慰的话，但心里清楚，你也不知道这条路还能走多远。' } },
      { text: '"要不……你别跟你爸硬扛了"', cost: '心态-5，信任-8', effects: { mood: -5, trust: -8 }, xdEmotion: 'sad', response: '要不……你别跟你爸硬扛了，我不想你为了我受委屈。', responseFrom: 'me', followUp: { from: 'xd', text: '你说这话是什么意思……你想放弃了吗？' } },
      { text: '沉默着陪她哭', cost: '心态-15，信任+12', effects: { mood: -15, trust: 12 }, xdEmotion: 'torn', response: '', responseFrom: 'me', followUp: { from: 'narrator', text: '你什么都没说，就这样听着她哭。电话那头，她慢慢平静下来。有些时候，陪伴比语言更有力量。但你挂了电话之后，一个人坐在出租屋里，眼眶也红了。' } },
    ],
    condition: function(s) { return true; }, weight: function(s) { return 10; }, minDay: 1,
  },
  {
    id: 'xd_sneak_out', type: 'repair',
    messages: [
      { from: 'xd', text: '我偷偷出来了' },
      { from: 'xd', text: '我爸不知道' },
      { from: 'xd', text: '你能来见我吗？就一会儿就好' },
    ],
    choices: [
      { text: '放下所有事情去见她', cost: '钱包-15，信任+12，心态+5', effects: { money: -15, trust: 12, mood: 5 }, xdEmotion: 'bittersweet', response: '你等着，我打车过来', responseFrom: 'me', followUp: { from: 'narrator', text: '你们在街角的奶茶店坐了四十分钟。她一直握着你的手，什么都没说。走的时候她回头看了你三次。' }, consumeTimeSlot: true },
      { text: '"别冒险了，被你爸发现更麻烦"', cost: '信任-5，心态-5', effects: { trust: -5, mood: -5 }, xdEmotion: 'sad', response: '别出来了，被你爸发现又要吵。我们视频也行。', responseFrom: 'me', followUp: { from: 'xd', text: '好吧……我就是太想你了。' } },
      { text: '"来我这边吧，我给你做饭"', cost: '钱包-10，信任+15，心态+10', effects: { money: -10, trust: 15, mood: 10 }, xdEmotion: 'happy', response: '来我这边吧，我给你做碗面', responseFrom: 'me', followUp: { from: 'narrator', text: '她来了你的出租屋。你给她煮了一碗西红柿鸡蛋面。她吃着吃着就哭了，说"就是这个味道，我不想失去这个味道"。' }, consumeTimeSlot: true },
    ],
    condition: function(s) { return true; }, weight: function(s) { return 8; }, minDay: 1,
  },
  {
    id: 'xd_sorry', type: 'repair',
    messages: [
      { from: 'xd', text: '对不起' },
      { from: 'xd', text: '因为我爸的事，让你受委屈了' },
      { from: 'xd', text: '你有没有后悔认识我' },
    ],
    choices: [
      { text: '"从来没有。认识你是我最幸运的事"', cost: '心态-5，信任+10', effects: { mood: -5, trust: 10 }, xdEmotion: 'bittersweet', response: '从来没有。认识你是我这辈子最幸运的事。', responseFrom: 'me', followUp: { from: 'xd', text: '我也是……所以才更难过。为什么偏偏是我们要经历这些。' } },
      { text: '"有时候确实觉得很累"', cost: '心态+5，信任-5', effects: { mood: 5, trust: -5 }, xdEmotion: 'sad', response: '说实话，有时候确实觉得很累。不是因为你，是这个世界让人太累了。', responseFrom: 'me', followUp: { from: 'narrator', text: '小丁很久没有回消息。你知道，你说了实话，但实话有时候比谎言更伤人。' } },
      { text: '"不要说对不起，这不是你的错"', cost: '心态-8，信任+8', effects: { mood: -8, trust: 8 }, xdEmotion: 'torn', response: '不要说对不起。你没有做错任何事，我也没有。错的是那些带着偏见看人的人。', responseFrom: 'me', followUp: { from: 'xd', text: '可是……那个带偏见的人是我爸啊……' } },
    ],
    condition: function(s) { return true; }, weight: function(s) { return 8; }, minDay: 1,
  },
  {
    id: 'xd_share_happy', type: 'repair',
    messages: [
      { from: 'xd', text: '今天我妈偷偷跟我说' },
      { from: 'xd', text: '她觉得你挺好的，就是你爸太固执了' },
      { from: 'xd', text: '至少我妈站我们这边！' },
    ],
    choices: [
      { text: '"真的吗！那阿姨能不能帮忙劝劝"', cost: '信任+10，心态+8', effects: { trust: 10, mood: 8 }, xdEmotion: 'hopeful', response: '真的吗！那阿姨能不能帮忙劝劝叔叔？', responseFrom: 'me', followUp: { from: 'xd', text: '我妈说她在想办法……但我爸脾气你也知道的。不过至少不是所有人都反对我们！' } },
      { text: '"一个人站我们这边也没用……"', cost: '心态-5', effects: { mood: -5 }, xdEmotion: 'sad', response: '一个人站我们这边也没用，你爸不松口，说什么都白搭。', responseFrom: 'me', followUp: { from: 'xd', text: '你能不能别这么丧……我只是想告诉你一个好消息……' } },
    ],
    condition: function(s) { return s.day >= 3; }, weight: function(s) { return 6; }, minDay: 3,
  },

  // ===== 父亲施压类 =====
  {
    id: 'father_calls_xd', type: 'conflict',
    messages: [
      { from: 'narrator', text: '小丁突然发来一大段消息。' },
      { from: 'xd', text: '我爸刚才又跟我谈了' },
      { from: 'xd', text: '他说如果我不分手，就断我的生活费' },
      { from: 'xd', text: '他还说要把我户口迁走' },
      { from: 'xd', text: '我好害怕' },
    ],
    choices: [
      { text: '"我养你。我加班赚钱，不用怕"', cost: '心态-10，钱包-5，信任+10', effects: { mood: -10, money: -5, trust: 10 }, xdEmotion: 'torn', response: '不用怕，我养你。从今天开始我多接几个活，钱的事不用你操心。', responseFrom: 'me', followUp: { from: 'narrator', text: '你说得很坚定，但打开银行APP看了一眼余额，手指微微发抖。' } },
      { text: '"你爸太过分了……但他毕竟是你爸"', cost: '心态-8，信任+3', effects: { mood: -8, trust: 3 }, xdEmotion: 'torn', response: '你爸太过分了……但他毕竟是你爸，你也别太跟他吵。', responseFrom: 'me', followUp: { from: 'xd', text: '我知道……可是他那些话真的好伤人。他说苏北人都不靠谱，我听着心都在痛，他说的是你啊。' } },
      { text: '"……要不，我去找你爸谈谈"', cost: '心态-15，信任+8', effects: { mood: -15, trust: 8 }, xdEmotion: 'worried', response: '我想去找你爸谈谈。让他了解真实的我，而不是他想象中的苏北人。', responseFrom: 'me', followUp: { from: 'xd', text: '不行不行，你不知道我爸的脾气……我怕他会当面说很难听的话。我受不了你被那样羞辱。' } },
    ],
    condition: function(s) { return true; }, weight: function(s) { return Math.max(5, 60 - s.trust) / 3; }, minDay: 2,
  },
  {
    id: 'father_ultimatum', type: 'conflict',
    messages: [
      { from: 'xd', text: '我爸给我下了最后通牒' },
      { from: 'xd', text: '他说这个月之内必须分手' },
      { from: 'xd', text: '不然就别认他这个爸' },
      { from: 'narrator', text: '你能感受到手机屏幕另一边，小丁在发抖。' },
    ],

var Game = {
  state: null,

  getInitState: function() {
    return { day: 1, timeSlotIdx: 0, mood: 70, money: 50, trust: 50, timeLeft: 4, xiaoDingEmotion: 'torn', awakening: 0, phase: 'activity', usedEvents: {}, dayEvents: 0, totalChoices: 0 };
  },

  start: function() {
    this.state = this.getInitState();
    this.showScreen('screen-game');
    this.clearChat();
    this.addMsg('system', '— 第1天 —');
    this.addMsg('narrator', '小丁昨晚又跟她爸吵了一架。因为你。因为你是苏北人。');
    this.addMsg('narrator', '你醒来看到她凌晨发的消息："对不起，又让你担心了。"');
    this.addMsg('narrator', '新的一天。你有4个时段可以安排。');
    this.showActivities();
    this.updateUI();
  },

  restart: function() { this.showScreen('screen-start'); },

  showScreen: function(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  },

  updateUI: function() {
    var s = this.state;
    document.getElementById('day-num').textContent = '第' + s.day + '天';
    document.getElementById('time-slot').textContent = TIME_SLOTS[s.timeSlotIdx] || '🌑 深夜';
    var emo = XD_EMOTIONS[s.xiaoDingEmotion] || XD_EMOTIONS['torn'];
    document.getElementById('xiaoding-mood').textContent = '小丁：' + emo.label;
    this.updateBar('mood', s.mood);
    this.updateBar('money', s.money);
    this.updateBar('trust', s.trust);
    document.getElementById('bar-time').style.width = (s.timeLeft / 4) * 100 + '%';
    document.getElementById('val-time').textContent = s.timeLeft + '/4';
  },

  updateBar: function(key, val) {
    val = Math.max(0, Math.min(100, val));
    document.getElementById('bar-' + key).style.width = val + '%';
    document.getElementById('val-' + key).textContent = val;
    if (val <= 20) {
      var el = document.getElementById('bar-' + key).parentElement;
      el.classList.add('shake');
      setTimeout(function() { el.classList.remove('shake'); }, 500);
    }
  },

  clearChat: function() { document.getElementById('chat-area').innerHTML = ''; },

  addMsg: function(from, text) {
    if (!text) return;
    var chat = document.getElementById('chat-area');
    // 带头像的消息（小丁 / 我）
    if (from === 'xd' || from === 'me') {
      var row = document.createElement('div');
      row.className = 'msg-row ' + (from === 'xd' ? 'msg-row-xd' : 'msg-row-me');
      var avatar = document.createElement('div');
      avatar.className = 'avatar ' + (from === 'xd' ? 'avatar-xd' : 'avatar-me');
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      var name = document.createElement('div');
      name.className = 'msg-name ' + (from === 'xd' ? 'msg-name-xd' : 'msg-name-me');
      name.textContent = from === 'xd' ? '小丁' : '我';
      var msg = document.createElement('div');
      msg.className = 'msg ' + (from === 'xd' ? 'msg-xd' : 'msg-me');
      msg.textContent = text;
      bubble.appendChild(name);
      bubble.appendChild(msg);
      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }
    // 系统/旁白/效果消息
    var div = document.createElement('div');
    var classMap = { system: 'msg msg-system', narrator: 'msg msg-narrator', effect: 'msg msg-effect' };
    div.className = classMap[from] || 'msg msg-system';
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  },

  addEffect: function(text, positive) {
    var div = this.addMsg('effect', text);
    if (div) { div.classList.add(positive ? 'effect-positive' : 'effect-negative'); }
  },

  setChoices: function(choices) {
    var area = document.getElementById('choices-area');
    area.innerHTML = '';
    choices.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn ' + (c.className || '');
      if (c.disabled) btn.classList.add('disabled');
      btn.innerHTML = c.text;
      if (c.cost) btn.innerHTML += '<span class="choice-cost">' + c.cost + '</span>';
      btn.onclick = function() { if (!c.disabled) c.action(); };
      area.appendChild(btn);
    });
  },

  applyEffects: function(effects) {
    var s = this.state;
    var labels = { mood: '心态', money: '钱包', trust: '信任' };
    var changes = [];
    for (var key in effects) {
      var val = effects[key];
      if (val === 0 || val == null) continue;
      if (!labels[key]) continue;
      var old = s[key];
      s[key] = Math.max(0, Math.min(100, s[key] + val));
      var actual = s[key] - old;
      if (actual !== 0) {
        var sign = actual > 0 ? '+' : '';
        changes.push(labels[key] + ' ' + sign + actual);
      }
    }
    if (changes.length > 0) {
      var allNeg = true;
      for (var k in effects) { if (labels[k] && effects[k] != null && effects[k] > 0) { allNeg = false; break; } }
      this.addEffect(changes.join('  '), !allNeg);
    }
    this.updateUI();
  },

  showActivities: function() {
    var s = this.state;
    var self = this;
    var choices = DAILY_ACTIVITIES.map(function(act) {
      var disabled = act.failCondition ? act.failCondition(s) : false;
      return { text: act.name, cost: act.cost, className: 'action-btn', disabled: disabled, action: function() { self.doActivity(act); } };
    });
    choices.push({ text: '⏭️ 跳过，直接进入事件', className: 'next-btn', action: function() { self.endActivities(); } });
    this.setChoices(choices);
  },

  doActivity: function(act) {
    var s = this.state;
    var self = this;
    if (act.failCondition && act.failCondition(s)) { this.addMsg('narrator', act.failText); return; }
    s.timeLeft--;
    s.timeSlotIdx = 4 - s.timeLeft;
    this.addMsg('narrator', act.narrative);
    this.applyEffects(act.effects);
    if (act.riskChance && Math.random() < act.riskChance) {
      setTimeout(function() { self.addMsg('narrator', act.riskText); self.applyEffects(act.riskEffects); }, 500);
    }
    if (this.checkEnding()) return;
    if (s.timeLeft <= 0) { setTimeout(function() { self.endActivities(); }, 800); }
    else { this.updateUI(); this.showActivities(); }
  },

  endActivities: function() {
    this.state.phase = 'event';
    this.addMsg('system', '— 事件 —');
    this.triggerEvent();
  },

  triggerEvent: function() {
    var s = this.state;
    var available = EVENT_POOL.filter(function(e) {
      if (s.usedEvents[e.id] && e.type !== 'daily') return false;
      if (e.minDay > s.day) return false;
      if (e.condition && !e.condition(s)) return false;
      return true;
    });
    if (available.length === 0) { this.endDay(); return; }
    var emo = XD_EMOTIONS[s.xiaoDingEmotion] || {};
    var emotionBias = emo.eventBias;
    var weights = available.map(function(e) {
      var w = e.weight(s);
      if (emotionBias && e.type === emotionBias) w *= 1.5;
      if (s.trust < 30 && e.type === 'conflict') w *= 2;
      if (s.mood < 30 && e.type === 'awakening') w *= 2;
      return w;
    });
    var totalWeight = weights.reduce(function(a, b) { return a + b; }, 0);
    var rand = Math.random() * totalWeight;
    var selectedIdx = 0;
    for (var i = 0; i < weights.length; i++) { rand -= weights[i]; if (rand <= 0) { selectedIdx = i; break; } }
    var event = available[selectedIdx];
    s.usedEvents[event.id] = true;
    this.playEvent(event);
  },

  playEvent: function(event) {
    var self = this;
    var delay = 0;
    event.messages.forEach(function(msg) {
      setTimeout(function() { self.addMsg(msg.from, msg.text); }, delay);
      delay += 700;
    });
    setTimeout(function() { self.showEventChoices(event); }, delay + 400);
  },

  showEventChoices: function(event) {
    var s = this.state;
    var self = this;
    var choices = event.choices.slice();
    if (s.mood < 25 && choices.length > 2) {
      var removeIdx = 1 + Math.floor(Math.random() * (choices.length - 1));
      choices.splice(removeIdx, 1);
      this.addMsg('narrator', '（你太累了，很多话到嘴边又咽回去了……）');
    }
    var choiceButtons = choices.map(function(c) {
      return { text: c.text, cost: c.cost, action: function() { self.makeChoice(event, c); } };
    });
    this.setChoices(choiceButtons);
  },

  makeChoice: function(event, choice) {
    var s = this.state;
    var self = this;
    s.totalChoices++;
    if (choice.response) { this.addMsg(choice.responseFrom || 'me', choice.response); }
    setTimeout(function() {
      self.applyEffects(choice.effects);
      if (choice.xdEmotion) { s.xiaoDingEmotion = choice.xdEmotion; self.updateUI(); }
      if (choice.setAwakening) { s.awakening++; self.addEffect('觉醒值 +1 (' + s.awakening + ')', true); }
      if (choice.followUp) {
        setTimeout(function() {
          self.addMsg(choice.followUp.from, choice.followUp.text);
          if (choice.consumeTimeSlot && s.timeLeft > 0) { s.timeLeft--; s.timeSlotIdx = 4 - s.timeLeft; self.addEffect('消耗了一个时间段', false); self.updateUI(); }
          if (choice.triggerEnding) { setTimeout(function() { self.showEnding(choice.triggerEnding); }, 1500); return; }
          if (self.checkEnding()) return;
          s.dayEvents++;
          setTimeout(function() {
            if (s.dayEvents < 2 && Math.random() < 0.6) { self.addMsg('system', '—'); self.triggerEvent(); }
            else { self.endDay(); }
          }, 800);
        }, 800);
      } else {
        if (choice.triggerEnding) { setTimeout(function() { self.showEnding(choice.triggerEnding); }, 1500); return; }
        if (self.checkEnding()) return;
        s.dayEvents++;
        setTimeout(function() { self.endDay(); }, 800);
      }
    }, 500);
  },

  endDay: function() {
    var s = this.state;
    var self = this;
    s.phase = 'dayEnd';
    this.addMsg('system', '— 第' + s.day + '天结束 —');
    // 小丁情绪缓和
    if (s.xiaoDingEmotion === 'sad') s.xiaoDingEmotion = 'torn';
    else if (s.xiaoDingEmotion === 'worried') s.xiaoDingEmotion = 'torn';
    else if (s.xiaoDingEmotion === 'torn') s.xiaoDingEmotion = 'bittersweet';
    this.addMsg('narrator', '又一天过去了。房租、吃饭、交通……日子在继续。');
    this.applyEffects({ mood: -3, money: -3 });
    if (this.checkEnding()) return;
    this.setChoices([{ text: '进入第' + (s.day + 1) + '天 ➡️', className: 'next-btn', action: function() { self.nextDay(); } }]);
  },

  nextDay: function() {
    var s = this.state;
    s.day++;
    s.timeSlotIdx = 0;
    s.timeLeft = 4;
    s.dayEvents = 0;
    s.phase = 'activity';
    if (s.day > MAX_DAYS) { this.checkFinalEnding(); return; }
    this.addMsg('system', '— 第' + s.day + '天 —');
    if (s.day === 3) this.addMsg('narrator', '你在这座城市已经习惯了被贴上"苏北人"的标签。但习惯不代表不痛。');
    else if (s.day === 5) this.addMsg('narrator', '第五天。你照镜子的时候发现自己瘦了。小丁也是。你们都在被这段关系消耗。');
    else if (s.day === 6) this.addMsg('narrator', '倒数第二天了。不管结果如何，你想告诉她：遇见你，我不后悔。');
    else if (s.day === 7) this.addMsg('narrator', '最后一天。你深吸一口气，打开了手机。');
    else {
      var mornings = [
        '闹钟响了。窗外是这座不完全属于你的城市。',
        '小丁昨晚的消息你看了很多遍。"晚安"两个字，她也能让你看出心酸。',
        '你醒来，想到今天要面对的一切，在床上多躺了五分钟。',
        '新的一天。你在心里跟自己说：再撑一下。',
        '天亮了。你摸了摸枕头旁边空着的位置，想起了她。',
      ];
      this.addMsg('narrator', mornings[Math.floor(Math.random() * mornings.length)]);
    }
    this.showActivities();
    this.updateUI();
  },

  checkEnding: function() {
    var s = this.state;
    if (s.mood <= 0) { this.showEnding('mood_zero'); return true; }
    if (s.money <= 0) { this.showEnding('money_zero'); return true; }
    if (s.trust <= 0) { this.showEnding('trust_zero'); return true; }
    return false;
  },

  checkFinalEnding: function() {
    var s = this.state;
    if (s.mood >= 80 && s.money >= 80 && s.trust >= 80) { this.showEnding('perfect'); return; }
    if (s.trust >= 60 && s.mood >= 50) { this.showEnding('good'); return; }
    this.showEnding('survived');
  },

  showEnding: function(endingId) {
    var ending = ENDINGS[endingId];
    if (!ending) return;
    var s = this.state;
    document.getElementById('ending-icon').textContent = ending.icon;
    document.getElementById('ending-title').textContent = ending.title;
    document.getElementById('ending-text').textContent = ending.text;
    document.getElementById('ending-stats').innerHTML =
      '<div>📅 坚持天数：' + s.day + ' / ' + MAX_DAYS + '</div>' +
      '<div>🧠 最终心态：' + s.mood + '</div>' +
      '<div>💰 最终钱包：' + s.money + '</div>' +
      '<div>🤝 最终信任：' + s.trust + '</div>' +
      '<div>🔮 觉醒次数：' + s.awakening + '</div>' +
      '<div>📊 总选择数：' + s.totalChoices + '</div>';
    this.showScreen('screen-ending');
  },
};
</script>
</body>
</html>
